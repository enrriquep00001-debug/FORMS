function capitalizarCampo(el){
  var pos=el.selectionStart;
  var palabras=el.value.split(' ');

    if(!p)return p;
    return p[0].toUpperCase()+p.slice(1).toLowerCase();

}

/* _coordToStr / _guardarCoord / _parsearCoord
   Oaxaca: latitud 15-18 (2 dígitos enteros), longitud 93-98 (2 dígitos enteros).
   Cuando Sheets guarda sin punto: 17.072128 → 17072128
   La corrección es siempre: insertar punto después del dígito 2. */

function _coordToStr(n){
  if(!n||isNaN(n)||n===0)return"";
  var neg=(n<0);
  var abs=Math.abs(n);
  // Convertir a string sin toFixed (evita problema de locale "17.072.128")
  // Multiplicar, truncar, reconstruir manualmente
  var s=String(Math.round(abs*1000000));
  // Pad a mínimo 8 dígitos (para coords de 2 dígitos enteros + 6 decimales)
  while(s.length<8)s="0"+s;
  // Insertar punto después del dígito 2 (regla Oaxaca)
  return(neg?"-":"")+s.substring(0,2)+"."+s.substring(2);
}

function _guardarCoord(val){
  if(val===null||val===undefined||val==="")return"";
  var s=String(val).replace(/[^0-9.\-]/g,"").trim();
  if(!s||s==="0")return"";
  var neg=(s[0]==="-");
  var digits=(neg?s.slice(1):s);
  // Quitar ceros decimales de toFixed: "17072128.000000" → "17072128"
  var puntoPosDigits=digits.indexOf(".");
  if(puntoPosDigits!==-1)digits=digits.substring(0,puntoPosDigits);
  // Ahora digits es solo la parte entera: "17072128" o "17" (si ya había punto real)
  // Si el original tenía punto decimal real (ej "17.072128"), parseFloat da el número correcto
  if(s.indexOf(".")!==-1){
    var parteEntera=digits; // dígitos antes del punto
    var parteDecimal=(neg?s.slice(1):s).split(".")[1]||"";
    // Si la parte entera tiene solo 2 dígitos, ya tiene el formato correcto
    if(parteEntera.length<=2){
      while(parteDecimal.length<6)parteDecimal+="0";
      return(neg?"-":"")+parteEntera+"."+parteDecimal.substring(0,6);
    }
    // Si la parte entera tiene más de 2 dígitos, es un número sin punto real
    // (ej "17072128.000000") — tratar como sin punto
  }
  // Sin punto real: insertar después del dígito 2
  while(digits.length<8)digits="0"+digits;
  return(neg?"-":"")+digits.substring(0,2)+"."+digits.substring(2,8);
}

function _parsearCoord(val){
  return _guardarCoord(val);
}

/* Longitud en Oaxaca SIEMPRE es negativa (-93.9 a -98.7).
   Si llega positiva (el sheet perdió el signo), se le agrega. */
function _parsearCoordLng(val){
  var r=_guardarCoord(val);
  if(!r)return"";
  // Si ya es negativa, bien
  if(r[0]==="-")return r;
  // Si es positiva y está en rango de longitud de Oaxaca (93-99), agregar signo
  var n=parseFloat(r);
  if(!isNaN(n)&&n>=93&&n<=99)return"-"+r;
  return r;
}

/* Para guardar longitud — siempre con signo negativo si está en rango Oaxaca */
function _guardarCoordLng(val){
  var r=_guardarCoord(val);
  if(!r)return"";
  if(r[0]==="-")return r;
  var n=parseFloat(r);
  if(!isNaN(n)&&n>=93&&n<=99)return"-"+r;
  return r;
}

function validarCurp(el){
  var val=el.value.trim();
  var wrap=document.getElementById("campo-curp");
  var msg=document.getElementById("msg-curp");
  if(!val){if(wrap){wrap.classList.remove("valido","error");}if(msg)msg.innerText="";return;}
  // Solo letras y números, sin caracteres especiales
  if(/[^A-Z0-9]/.test(val)){
    el.value=val.replace(/[^A-Z0-9]/g,"");
    val=el.value;
  }
  if(val.length>0&&val.length<18){
    if(wrap){wrap.classList.add("error");wrap.classList.remove("valido");}
    if(msg){msg.innerText="La CURP debe tener 18 caracteres";msg.className="campo-msg msg-error";}
    return;
  }
  if(val.length===18){
    // Extraer edad del CURP: posiciones 4-9 son AAMMDD
    var anio=parseInt(val.substring(4,6),10);
    var mes=parseInt(val.substring(6,8),10);
    var dia=parseInt(val.substring(8,10),10);
    if(!isNaN(anio)&&!isNaN(mes)&&!isNaN(dia)&&mes>=1&&mes<=12&&dia>=1&&dia<=31){
      var hoy=new Date();
      var siglo=anio<=parseInt(String(hoy.getFullYear()).substring(2,4))?2000:1900;
      var nacimiento=new Date(siglo+anio,mes-1,dia);
      var edad=hoy.getFullYear()-nacimiento.getFullYear();
      var m=hoy.getMonth()-nacimiento.getMonth();
      if(m<0||(m===0&&hoy.getDate()<nacimiento.getDate()))edad--;
      if(edad<18){
        if(wrap){wrap.classList.add("error");wrap.classList.remove("valido");}
        if(msg){msg.innerText="La CURP indica que la persona es menor de 18 años ("+edad+" años)";msg.className="campo-msg msg-error";}
        return;
      }
      if(edad>120){
        if(wrap){wrap.classList.add("error");wrap.classList.remove("valido");}
        if(msg){msg.innerText="Fecha de nacimiento inválida en la CURP";msg.className="campo-msg msg-error";}
        return;
      }
      // Auto-llenar edad si el campo está vacío
      var edadEl=document.getElementById("edad");
      if(edadEl&&!edadEl.value.trim()){edadEl.value=edad;}
    }
    if(wrap){wrap.classList.add("valido");wrap.classList.remove("error");}
    if(msg){msg.innerText="✓ CURP válida";msg.className="campo-msg msg-ok";}
  }
}

    _doSalir();

function _fileABase64(file,tipo){return new Promise(function(resolve){if(!file){resolve(null);return;}var reader=new FileReader();reader.onload=function(e){var dataUrl=e.target.result;var mimeType=file.type||"image/jpeg";if(file.size<4*1024*1024){resolve({tipo:tipo,base64:dataUrl.split(",")[1],mimeType:mimeType});return;}var img=new Image();img.onload=function(){var MAX=2400;var w=img.width,h=img.height;if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}var canvas=document.createElement("canvas");canvas.width=w;canvas.height=h;canvas.getContext("2d").drawImage(img,0,0,w,h);var b64=canvas.toDataURL("image/jpeg",0.92).split(",")[1];resolve({tipo:tipo,base64:b64,mimeType:"image/jpeg"});};img.onerror=function(){resolve(null);};img.src=dataUrl;};reader.onerror=function(){resolve(null);};reader.readAsDataURL(file);});}

var _guardandoEnCurso = false; // bandera global anti-doble-clic

function confirmarEnvio(){
  if(_guardandoEnCurso)return; // evitar doble envío
  _guardandoEnCurso=true;
  document.getElementById("modal-envio").classList.remove("activo");
  if(!_dataPendiente){_guardandoEnCurso=false;alert("Error interno. Intenta de nuevo.");return;}
  var data=_dataPendiente;

  // Deshabilitar TODOS los botones de guardar y el botón confirmar del modal
  document.querySelectorAll(".btn-guardar, #modal-envio .modal-btn-continuar").forEach(function(b){
    b.disabled=true;b.style.opacity="0.6";
  });
  var btnActivo=document.querySelector(".seccion.activa .btn-guardar")||document.querySelector(".btn-guardar");
  if(btnActivo)btnActivo.innerText="⏳ Guardando datos...";

  data.fotos=[];
  google.script.run
    .withSuccessHandler(function(res){
      _dataPendiente=null;
      var idRegistro=res.idRegistro||"";
      var primerNombre=document.getElementById("nombres").value.trim().split(" ")[0]||"foto";
      var tipos=["fachada","interior","entorno"];
      var archivos=[
        (document.getElementById("input-fachada")||{files:[]}).files[0]||null,
        (document.getElementById("input-interior")||{files:[]}).files[0]||null,
        (document.getElementById("input-entorno")||{files:[]}).files[0]||null
      ];
      var totalFotos=archivos.filter(function(f){return f!==null;}).length;
      var fotosCargadas=0;
      function subirSiguienteFoto(idx){
        if(idx>=tipos.length){_mostrarExito(idRegistro);return;}
        var file=archivos[idx];
        if(!file){subirSiguienteFoto(idx+1);return;}
        if(btnActivo)btnActivo.innerText="Subiendo foto "+(fotosCargadas+1)+" de "+totalFotos+"...";
        _fileABase64(file,tipos[idx]).then(function(fotoObj){
          if(!fotoObj){subirSiguienteFoto(idx+1);return;}
          google.script.run
            .withSuccessHandler(function(){fotosCargadas++;subirSiguienteFoto(idx+1);})
            .withFailureHandler(function(err){console.warn("Error foto:"+tipos[idx]);subirSiguienteFoto(idx+1);})
            .guardarFotoEnDrive(idRegistro,primerNombre,fotoObj);
        });
      }
      subirSiguienteFoto(0);
    })
    .withFailureHandler(function(err){
      _dataPendiente=null;_guardandoEnCurso=false;
      // Rehabilitar botones
      document.querySelectorAll(".btn-guardar").forEach(function(b){
        b.disabled=false;b.style.opacity="";b.innerText="✅ Guardar registro";
      });
      alert("Error al guardar: "+(err.message||err));
    })
    .guardarBeneficiario(data);
}

/* ══ CATÁLOGO LENGUAS — carga dinámica desde Sheets ══ */
var _lenguasCatCache = null;
var _lenguasCatCargando = false;

function _cargarCatLenguas(callback) {
  if (_lenguasCatCache !== null) { callback(_lenguasCatCache); return; }
  if (_lenguasCatCargando) { setTimeout(function(){ _cargarCatLenguas(callback); }, 250); return; }
  _lenguasCatCargando = true;
  google.script.run
    .withSuccessHandler(function(res) {
      // res = array de strings de nombres de lengua
      if (res && res.length > 0) {
        // Enriquecer/reemplazar la lista local con la del catálogo
        _lenguasCatCache = res.map(function(n,i){ return { id: String(i+1), nombre: String(n) }; });
      } else {
        // Fallback: usar la lista local hardcodeada
        _lenguasCatCache = LENGUAS_INDIGENAS;
      }
      _lenguasCatCargando = false;
      callback(_lenguasCatCache);
    })
    .withFailureHandler(function(e) {
      console.warn("Error lenguas catálogo:", e);
      _lenguasCatCache = LENGUAS_INDIGENAS; // fallback a lista local
      _lenguasCatCargando = false;
      callback(_lenguasCatCache);
    })
    .obtenerCatalogoLenguas();
}

function filtrarLenguas(query){
  var dd=document.getElementById("lenguas-dropdown");
  if(!dd)return;
  if(!query||query.trim().length<1){dd.style.display="none";return;}
  var q=quitarAcentos(query.toLowerCase().trim());
  // Usar catálogo dinámico si ya cargó, si no la lista local
  var lista = _lenguasCatCache || LENGUAS_INDIGENAS;
  var res=[];
  for(var i=0;i<lista.length;i++){
    if(quitarAcentos(lista[i].nombre.toLowerCase()).indexOf(q)!==-1) res.push(lista[i]);
  }
  if(res.length===0){dd.style.display="none";return;}
  var html="";
  for(var j=0;j<res.length;j++){
    var l=res[j];
    html+='<div onmousedown="seleccionarLengua(this)" data-nombre="'+l.nombre.replace(/"/g,"&quot;")+'" style="padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid #f0e9de;display:flex;gap:10px"><span style="color:#7a5f68;font-size:11px;min-width:36px">'+l.id+'</span><span>'+l.nombre+'</span></div>';
  }
  dd.innerHTML=html;dd.style.display="block";
}

var _registrosCache=[];

/* ── DETECCIÓN DE CAMBIOS EN EL FORMULARIO ── */
function _hayDatosCapturados(){
  // Revisa si hay algo escrito en los campos clave del formulario
  var campos=["primerApellido","nombres","edad","telefono","calle","municipio","localidad","curp"];
  for(var i=0;i<campos.length;i++){
    var el=document.getElementById(campos[i]);
    if(el&&el.value.trim()!=="")return true;
  }
  // También revisar si ya hay fotos seleccionadas
  var fotos=["input-fachada","input-interior","input-entorno"];
  for(var j=0;j<fotos.length;j++){
    var fi=document.getElementById(fotos[j]);
    if(fi&&fi.files&&fi.files.length>0)return true;
  }
  return false;
}

var _vistaPendiente=null; // vista a la que quiere ir después de confirmar

function mostrarVista(vista){
  var cuest=document.getElementById("cuestionario-wrap");
  var prog=document.getElementById("progress-wrap");
  var exito=document.getElementById("exito-wrap");
  var panel=document.getElementById("panel-registros");
  var edit=document.getElementById("pantalla-edicion");
  var inicio=document.getElementById("pantalla-inicio");
  var tabI=document.getElementById("tab-inicio");
  var tabC=document.getElementById("tab-cuestionario");
  var tabR=document.getElementById("tab-registros");
  var tabCfg=document.getElementById("tab-config");
  var panelCfg=document.getElementById("panel-config");

  // Si hay datos capturados y va a salir del cuestionario → preguntar
  var exitoVisible=(exito&&exito.style.display==="block");
  var cuestionarioVisible=(cuest&&cuest.style.display!=="none");
  if((vista==="registros"||vista==="inicio")&&cuestionarioVisible&&!exitoVisible&&_hayDatosCapturados()){
    _vistaPendiente=vista;
    document.getElementById("modal-salir").classList.add("activo");
    return;
  }

  // Ocultar todo
  if(cuest)cuest.style.display="none";
  if(prog)prog.style.display="none";
  if(exito)exito.style.display="none";
  if(panel)panel.style.display="none";
  if(edit)edit.style.display="none";
  if(inicio)inicio.style.display="none";
  if(panelCfg)panelCfg.style.display="none";
  [tabI,tabC,tabR,tabCfg].forEach(function(t){if(t)t.classList.remove("activo");});

  if(vista==="inicio"){
    if(inicio)inicio.style.display="block";
    if(tabI)tabI.classList.add("activo");
  } else if(vista==="registros"){
    if(panel)panel.style.display="block";
    if(tabR)tabR.classList.add("activo");
    cargarUltimosRegistros();
  } else if(vista==="config"){
    if(panelCfg)panelCfg.style.display="block";
    if(tabCfg)tabCfg.classList.add("activo");
    _cargarPanelConfig();
  } else {
    // cuestionario — si venía de otra vista, limpiar siempre para nuevo registro
    var veniaDeCuestionario=(cuest&&cuest.style.display!=="none");
    if(cuest)cuest.style.display="";
    if(prog)prog.style.display="";
    if(tabC)tabC.classList.add("activo");
    if(!veniaDeCuestionario){
      // Viene de inicio o registros → limpiar para nuevo registro limpio
      nuevoRegistro();
    } else {
      // Ya estaba en cuestionario, solo asegurar que haya un paso activo
      var hayAlgunActivo=false;
      for(var p=1;p<=totalPasos;p++){var pp=document.getElementById("paso-"+p);if(pp&&pp.className.indexOf("activa")!==-1){hayAlgunActivo=true;break;}}
      if(!hayAlgunActivo)irPaso(1);
    }
  }
}

function accionSalir(accion){
  document.getElementById("modal-salir").classList.remove("activo");
  if(accion==="quedarme"){_vistaPendiente=null;return;}
  if(accion==="descartar"&&_vistaPendiente){
    var dest=_vistaPendiente;_vistaPendiente=null;
    nuevoRegistro();
    mostrarVista(dest);
  }
}

function accionSalirYGuardar(){
  document.getElementById("modal-salir").classList.remove("activo");
  // Ir al paso 5 donde está el botón guardar, y disparar el guardado
  irPaso(5);
  // Pequeño delay para que el UI actualice antes de abrir el modal de envío
  setTimeout(function(){ guardarBeneficiario(); }, 150);
}

function confirmarSalirSinGuardar(){
  if(_hayDatosCapturados()){
    _vistaPendiente="inicio";
    document.getElementById("modal-salir").classList.add("activo");
  } else {
    nuevoRegistro();
    mostrarVista("inicio");
  }
}

function cargarUltimosRegistros(){
  var cont=document.getElementById("reg-contenido");
  cont.innerHTML='<div class="reg-cargando">⏳ Cargando último registro…</div>';
  google.script.run
    .withSuccessHandler(function(res){
      if(!res||res.length===0){cont.innerHTML='<div class="reg-empty">No hay registros todavía.</div>';return;}
      _renderTabla(res);
    })
    .withFailureHandler(function(e){cont.innerHTML='<div class="reg-empty" style="color:var(--rojo);padding:20px"><strong>Error:</strong> '+(e.message||JSON.stringify(e))+'<br><small>Republica el script.</small></div>';})
    .obtenerUltimosRegistros(1);
}

    return;
  }
  document.getElementById("reg-contenido").innerHTML='<div class="reg-cargando">⏳ Buscando…</div>';

  var html='<table class="reg-tabla"><thead><tr><th>ID Folio</th><th>Fecha</th><th>Nombre completo</th><th>Municipio</th><th>📞 Llamada</th><th>Acciones</th></tr></thead><tbody>';

    var r=rows[i];

    // r[54] = LlamadaRealizada (índice 54, columna 55 del sheet)
    var llamada=String(r[54]||"").toLowerCase();

    html+='<tr>'
      +'<td><span class="reg-id">'+(r[2]||"—")+'</span></td>'
      +'<td>'+(r[1]||"—")+'</td>'
      +'<td>'+nombre+'</td>'
      +'<td>'+(r[21]||"—")+'</td>'
      +'<td>'+llamadaBadge+'</td>'
      +'<td style="white-space:nowrap">'
        +'<button class="btn-reg-edit" onclick="abrirEditar('+i+')">✏️ Editar</button>'
        +'<button class="btn-reg-del" onclick="eliminarRegistro('+i+')">🗑️</button>'
      +'</td>'
    +'</tr>';
  }
  html+='</tbody></table>';
  cont.innerHTML=html;
}

function eliminarRegistro(idx){
  var r=_registrosCache[idx];if(!r)return;
  var nombre=((r[3]||"")+" "+(r[4]||"")+" "+(r[5]||"")).trim();
  if(!confirm('¿Eliminar registro '+(r[2]||"")+'  — '+nombre+'?\nEsta acción no se puede deshacer.'))return;

    .withSuccessHandler(function(){cargarUltimosRegistros();})

function abrirEditar(idx){

  var hdr=document.getElementById("modo-edicion-header");

  if(hdr)hdr.style.display="block";
  if(tit)tit.innerText=nombre||"Sin nombre";

  // Limpiar estado anterior sin tocar el mapa
  _limpiarFormularioSinMapa();

  // Helper — asigna valor a un campo del formulario principal
  function s(id,val){var el=document.getElementById(id);if(el)el.value=val||"";}

  // Datos de identificación
  s("primerApellido",efV(r,"primerApellido"));
  s("segundoApellido",efV(r,"segundoApellido"));
  s("nombres",efV(r,"nombres"));
  s("curp",(efV(r,"curp")||"").toUpperCase());
  s("edad",efV(r,"edad"));
  s("telefono",efV(r,"telefono"));
  // Domicilio
  s("municipio",efV(r,"municipio"));
  s("localidad",efV(r,"localidad"));
  s("colonia",efV(r,"colonia"));
  s("cp",efV(r,"cp"));
  s("calle",efV(r,"calle"));
  s("numExterior",efV(r,"numExterior"));
  s("numInterior",efV(r,"numInterior"));
  var _lat=_parsearCoord(efV(r,"latitud"));
  var _lng=_parsearCoordLng(efV(r,"longitud")); // longitud siempre negativa en Oaxaca
  s("latitud",_lat);s("longitud",_lng);
  // Situación social
  s("personasVivienda",efV(r,"personasVivienda"));
  s("ingresoMensual",efV(r,"ingresoMensual"));
  s("personasPrograma",efV(r,"personasPrograma"));
  s("tipoVivienda",efV(r,"tipoVivienda"));
  s("jefeFamilia",efV(r,"jefeFamilia"));
  s("habitantesCarac",efV(r,"habitantesCarac"));
  // Estructura
  s("numDormitorios",efV(r,"numDormitorios"));
  s("espacioConstruccion",efV(r,"espacioConstruccion"));
  // Predio
  s("tipoTenenciaPredio",efV(r,"tipoTenenciaPredio"));
  s("condicionesAcceso",efV(r,"condicionesAcceso"));
  s("documentoPredio",efV(r,"documentoPredio"));
  // Materiales
  s("materialPiso",efV(r,"materialPiso"));
  s("materialTecho",efV(r,"materialTecho"));
  s("materialMuros",efV(r,"materialMuros"));
  // Territorio (solo lectura visual)
  s("lenguaIndigena",efV(r,"lenguaIndigena"));
  s("tipoDiscapacidad",efV(r,"tipoDiscapacidad"));

  // Booleanos — usa la función selBool del formulario principal
  ["hablaLengua","poblacionIndigena","poblacionAfro","tieneDiscapacidad",
   "danoEstructural","danoNatural","zonaRiesgo"].forEach(function(campo){
    var val=efV(r,campo);
    boolValues[campo]=val||null;
    var sel=document.getElementById("bool-wrap-"+campo);
    if(sel){sel.value=val||"";sel.classList.remove("bool-si","bool-no","bool-valido");
      if(val==="Si")sel.classList.add("bool-si","bool-valido");
      else if(val==="No")sel.classList.add("bool-no","bool-valido");}
    selBool(campo,val);
  });

  // Servicios
  var srvMap={agua:"aguaPotable",drenaje:"drenaje",electricidad:"electricidad",gas:"gas",internet:"internet"};
  Object.keys(srvMap).forEach(function(srv){
    var val=String(efV(r,srvMap[srv])||"").toLowerCase();
    var el=document.getElementById("srv-"+srv);var ic=document.getElementById("icon-"+srv);
    if(!el)return;
    if(val==="sí"||val==="si"){el.classList.add("checked");if(ic)ic.innerHTML="✓";}
    else{el.classList.remove("checked");if(ic)ic.innerHTML="";}
  });

  // Checkbox llamada
  var chk=document.getElementById("llamadaRealizada");
  if(chk){var vL=String(efV(r,"llamadaRealizada")||"").toLowerCase();chk.checked=(vL==="sí"||vL==="si");}

  // Validar CURP cargado (aplica las mismas restricciones que al escribir)

  if(curpEl&&curpEl.value){
    curpEl.value=curpEl.value.toUpperCase().replace(/[^A-Z0-9]/g,"");

  }

  // Lógica condicional del formulario
  toggleDocumentoPredio();
  chequearCorteVivienda();

  // Mapa — destruir instancia anterior y rearrancar con las coords correctas
  var latN=parseFloat(_lat), lngN=parseFloat(_lng);
  var usarLat = (!isNaN(latN)&&latN!==0) ? latN : null;
  var usarLng = (!isNaN(lngN)&&lngN!==0) ? lngN : null;

  // Destruir mapa anterior para evitar que quede en posición vieja
  if(_mapas["mapa-gps"]){
    try{_mapas["mapa-gps"].map.remove();}catch(e){}
    delete _mapas["mapa-gps"];
  }

  setTimeout(function(){
    if(usarLat&&usarLng){
      // Hay coords guardadas — mostrar exactamente ahí con zoom de predio
      _iniciarMapa("mapa-gps",usarLat,usarLng);
      setTimeout(function(){
        if(_mapas["mapa-gps"]){

        }
      },200);
    } else {
      // Sin coords — centrar por municipio o por defecto
      var coords=_coordsMunicipio(efV(r,"municipio"));
      var lat2=coords?coords[0]:_LAT_DEFAULT;
      var lng2=coords?coords[1]:_LNG_DEFAULT;
      _iniciarMapa("mapa-gps",lat2,lng2);
      // También intentar afinar por CP
      var cpVal=efV(r,"cp");
      if(cpVal&&cpVal.length===5){
        setTimeout(function(){_centrarMapaPorCP(cpVal,"mapa-gps");},500);
      }
    }
  },300);

  // Navegar al formulario (sin barra de progreso en modo edición)
  var panel=document.getElementById("panel-registros");
  var cuest=document.getElementById("cuestionario-wrap");
  var prog=document.getElementById("progress-wrap");
  if(panel)panel.style.display="none";
  if(cuest)cuest.style.display="";
  if(prog)prog.style.display="none";

  window.scrollTo({top:0,behavior:"smooth"});
}

function efPrevisualizarFoto(tipo,input){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];
  var reader=new FileReader();
  reader.onload=function(e){
    var prev=document.getElementById("ef-prev-"+tipo);var zona=document.getElementById("ef-zona-"+tipo);var est=document.getElementById("ef-est-"+tipo);
    if(prev)prev.innerHTML='<img src="'+e.target.result+'" alt="foto '+tipo+'">';
    if(zona)zona.classList.add("con-foto");if(est)est.innerHTML="✅ Nueva foto lista";
  };
  reader.readAsDataURL(file);
}

function efCargarLinksExistentes(r){
  // r[43]=FotoFachada  r[44]=FotoInterior  r[45]=FotoEntorno  (base-0, col 44,45,46)
  var tipos=[{tipo:"fachada",idx:43},{tipo:"interior",idx:44},{tipo:"entorno",idx:45}];

function _coordsMunicipio(nombre) {
  if (!nombre) return null;
  // Búsqueda exacta primero
  if (_COORDS_MUNICIPIOS[nombre]) return _COORDS_MUNICIPIOS[nombre];
  // Búsqueda parcial (por si el nombre tiene variantes)
  var q = nombre.toLowerCase();
  var keys = Object.keys(_COORDS_MUNICIPIOS);
  for (var i = 0; i < keys.length; i++) {
    if (keys[i].toLowerCase().indexOf(q) !== -1 || q.indexOf(keys[i].toLowerCase()) !== -1) {
      return _COORDS_MUNICIPIOS[keys[i]];
    }
  }
  return null;
}

function navMunDropdown(e,ddId){
  var dd=document.getElementById(ddId);
  if(!dd||dd.style.display==="none")return;
  var items=dd.querySelectorAll(".mun-item");
  if(!items.length)return;
  if(e.key==="ArrowDown"){e.preventDefault();_munActivoIdx=Math.min(_munActivoIdx+1,items.length-1);}
  else if(e.key==="ArrowUp"){e.preventDefault();_munActivoIdx=Math.max(_munActivoIdx-1,0);}
  else if(e.key==="Enter"&&_munActivoIdx>=0){e.preventDefault();items[_munActivoIdx].dispatchEvent(new MouseEvent("mousedown"));return;}
  else if(e.key==="Escape"){dd.style.display="none";_munActivoIdx=-1;return;}
  items.forEach(function(it,i){it.classList.toggle("activo",i===_munActivoIdx);});
  if(_munActivoIdx>=0)items[_munActivoIdx].scrollIntoView({block:"nearest"});
}

var _mapas = {};
var _LAT_DEFAULT = 17.0669;
var _LNG_DEFAULT = -96.7203;

function _leafletDisponible(){return typeof L!=='undefined';}

function _iniciarMapa(mapaId,lat,lng){
  if(!_leafletDisponible()){console.warn('Leaflet no cargado');return;}
  lat=parseFloat(lat)||_LAT_DEFAULT;
  lng=parseFloat(lng)||_LNG_DEFAULT;
  if(_mapas[mapaId]){
    _mapas[mapaId].map.setView([lat,lng],15);
    _mapas[mapaId].marker.setLatLng([lat,lng]);
    _actualizarBadge(mapaId,lat,lng);
    setTimeout(function(){_mapas[mapaId].map.invalidateSize();},80);
    return;
  }
  var contenedor=document.getElementById(mapaId);
  if(!contenedor)return;
  var map=L.map(mapaId,{center:[lat,lng],zoom:15,attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  var icono=L.divIcon({className:'',html:'<div style="width:22px;height:22px;background:#7B1D3F;border:3px solid white;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,.4)"></div>',iconSize:[22,22],iconAnchor:[11,22]});
  var marker=L.marker([lat,lng],{draggable:true,icon:icono}).addTo(map);
  var latId=mapaId==='mapa-gps'?'latitud':'ef-latitud';
  var lngId=mapaId==='mapa-gps'?'longitud':'ef-longitud';
  function actualizarInputs(ll){
    var a=document.getElementById(latId);var b=document.getElementById(lngId);
    if(a)a.value=ll.lat.toFixed(6);if(b)b.value=ll.lng.toFixed(6);
    _actualizarBadge(mapaId,ll.lat,ll.lng);
  }
  marker.on('dragend',function(){actualizarInputs(marker.getLatLng());});
  map.on('click',function(e){marker.setLatLng(e.latlng);actualizarInputs(e.latlng);});
  _mapas[mapaId]={map:map,marker:marker};
  _actualizarBadge(mapaId,lat,lng);
  setTimeout(function(){map.invalidateSize();},120);
}

function _actualizarBadge(mapaId,lat,lng){
  var b=document.getElementById(mapaId+'-badge');
  if(b)b.innerText=parseFloat(lat).toFixed(5)+', '+parseFloat(lng).toFixed(5);
}

function centrarMapaEnUbicacion(mapaId,latId,lngId){
  var lat=parseFloat((document.getElementById(latId)||{}).value)||_LAT_DEFAULT;
  var lng=parseFloat((document.getElementById(lngId)||{}).value)||_LNG_DEFAULT;
  _iniciarMapa(mapaId,lat,lng);
}

function actualizarMapaDesdeInputs(mapaId,latId,lngId){
  if(!_mapas[mapaId])return;
  var lat=parseFloat((document.getElementById(latId)||{}).value);
  var lng=parseFloat((document.getElementById(lngId)||{}).value);
  if(!isNaN(lat)&&!isNaN(lng)&&lat>=-90&&lat<=90&&lng>=-180&&lng<=180){
    _mapas[mapaId].map.setView([lat,lng],15);
    _mapas[mapaId].marker.setLatLng([lat,lng]);
    _actualizarBadge(mapaId,lat,lng);
  }
}

/* ══════════════════════════════════════════════
   GEOCODING POR CP — Nominatim (OpenStreetMap)
   Gratuito, sin API key.
   Cache local para no repetir peticiones iguales.
══════════════════════════════════════════════ */
var _cpCache = {}; // { "68000": [lat, lng] }

function _centrarMapaPorCP(cp, mapaId) {
  if (!cp || cp.length < 4) return;
  cp = String(cp).trim();
  if (!mapaId) mapaId = 'mapa-gps';

  // Si ya está en caché, centrar directo
  if (_cpCache[cp]) {
    _centrarMapaEnCoords(mapaId, _cpCache[cp][0], _cpCache[cp][1], 15);
    return;
  }

  // Llamar a Nominatim (OpenStreetMap) — sin API key, sin costo
  // country=mx para limitar a México y mejorar precisión
  var url = 'https://nominatim.openstreetmap.org/search'
          + '?postalcode=' + encodeURIComponent(cp)
          + '&country=mx'
          + '&format=json'
          + '&limit=1';

  fetch(url, { headers: { 'Accept-Language': 'es' } })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data && data.length > 0) {
        var lat = parseFloat(data[0].lat);
        var lng = parseFloat(data[0].lon);
        if (!isNaN(lat) && !isNaN(lng)) {
          _cpCache[cp] = [lat, lng]; // guardar en caché
          _centrarMapaEnCoords(mapaId, lat, lng, 15);
        }
      }
    })
    .catch(function(e){ console.warn('Nominatim CP error:', e); });
}

function _centrarMapaEnCoords(mapaId, lat, lng, zoom) {
  if (_mapas[mapaId]) {
    _mapas[mapaId].map.setView([lat, lng], zoom || 15);
    // NO mover el marcador — solo el encuadre del mapa
    // El marcador se mueve solo cuando el usuario hace clic o arrastra
  } else {
    // Mapa no iniciado: actualizar defaults y arrancar
    _LAT_DEFAULT = lat;
    _LNG_DEFAULT = lng;
    _iniciarMapa(mapaId, lat, lng);
  }
}

// Aplica el estado habilitado/deshabilitado del territorio al paso 6
function _aplicarEstadoTerritorio(activo){
  SESION.territorioActivo=activo;
  var paso6=document.getElementById("paso-6");
  if(!paso6)return;

  // Banners
  var bBloq=document.getElementById("banner-territorio-bloqueado");
  var bActivo=document.getElementById("banner-territorio-activo");
  if(bBloq)bBloq.style.display=activo?"none":"block";
  if(bActivo)bActivo.style.display=activo?"block":"none";

  // Todas las cards del territorio
  paso6.querySelectorAll(".card-territorio").forEach(function(card){
    if(activo){
      // Quitar bloqueo visual
      card.style.opacity="1";
      card.style.pointerEvents="auto";
      // Habilitar inputs, selects, textareas
      card.querySelectorAll("input,select,textarea").forEach(function(el){
        el.removeAttribute("disabled");
        el.style.opacity="";
        el.style.pointerEvents="";
      });
      // Habilitar foto-zonas
      card.querySelectorAll(".foto-zona").forEach(function(el){
        el.style.opacity="1";
        el.style.pointerEvents="auto";
        el.style.cursor="pointer";
      });
      // Habilitar servicios
      card.querySelectorAll(".servicio-check").forEach(function(el){
        el.style.pointerEvents="auto";
        el.style.cursor="pointer";
      });
    } else {
      // Bloquear visualmente
      card.style.opacity="0.5";
      card.style.pointerEvents="none";
    }
  });
}

function toggleTerritorioConfig(activo){
  // Actualizar visual del slider
  var slider=document.getElementById("config-territorio-slider");
  var knob=document.getElementById("config-slider-knob");
  var estado=document.getElementById("config-territorio-estado");
  var capTxt=document.getElementById("config-cap-estado-txt");
  var capCard=document.getElementById("config-estado-capturista");
  if(slider){slider.style.background=activo?"var(--verde)":"#ccc";}
  if(knob){knob.style.transform=activo?"translateX(24px)":"translateX(0)";}
  if(estado){
    estado.style.background=activo?"#e6f4ed":"#fff3f3";
    estado.style.border="1px solid "+(activo?"var(--verde)":"var(--rojo)");
    estado.style.color=activo?"var(--verde)":"var(--rojo)";
    estado.innerText=activo?"✅ Los capturistas podrán ver y llenar la sección de territorio.":"🔒 La sección de territorio está desactivada para los capturistas.";
  }
  if(capTxt)capTxt.innerText=activo?"✅ Habilitado":"🔒 Deshabilitado";
  if(capCard){capCard.style.background=activo?"#e6f4ed":"var(--crema-dark)";capCard.style.border="1px solid "+(activo?"var(--verde)":"var(--borde)");}
}

function guardarConfigTerritorioAhora(){
  var check=document.getElementById("config-territorio-check");
  var activo=check?check.checked:false;
  var btn=document.getElementById("btn-guardar-config");
  if(btn){btn.disabled=true;btn.innerText="⏳ Guardando...";}
  google.script.run
    .withSuccessHandler(function(res){
      if(btn){btn.disabled=false;btn.innerText="💾 Guardar configuración";}
      if(res&&res.ok){
        alert("✅ Configuración guardada. Los capturistas verán el cambio al iniciar sesión.");
      }
    })
    .withFailureHandler(function(e){
      if(btn){btn.disabled=false;btn.innerText="💾 Guardar configuración";}
      alert("Error al guardar: "+(e.message||e));
    })
    .guardarConfig({territorioActivo:activo});
}

function _cargarPanelConfig(){
  // Cargar estado actual desde el servidor
  var check=document.getElementById("config-territorio-check");
  google.script.run
    .withSuccessHandler(function(cfg){
      var activo=cfg&&cfg.territorioActivo;
      if(check)check.checked=activo;
      toggleTerritorioConfig(activo);
    })
    .withFailureHandler(function(){
      if(check)check.checked=false;
      toggleTerritorioConfig(false);
    })
    .obtenerConfig();
}
